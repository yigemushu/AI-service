<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 客服助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <span>AI 客服助手</span>
        <strong>选中消息后生成回复草稿</strong>
      </header>

      <section class="panel">
        <div class="section-title">插件连接码</div>
        <label>
          粘贴网站设置页复制的连接码
          <textarea id="connectionCode" class="compact" placeholder="aics_..."></textarea>
        </label>
        <button id="importConnectionCode" type="button" class="primary">导入配置并测试连接</button>
        <p class="hint">连接码包含 Webhook Token，请只使用自己网站设置页生成的连接码。</p>
      </section>

      <details class="panel advanced-config">
        <summary>高级手动配置</summary>
        <label>
          网站地址
          <input id="baseUrl" placeholder="http://localhost:3000" />
        </label>

        <label>
          Webhook Token
          <input id="token" placeholder="填写网站设置页里的 Token" type="text" />
        </label>

        <label>
          我的昵称
          <input id="myNickname" placeholder="可选，用于排除自己的名字" />
        </label>

        <div class="grid">
          <label>
            平台
            <select id="platform">
              <option value="闲鱼">闲鱼</option>
              <option value="微信">微信</option>
              <option value="淘宝">淘宝</option>
              <option value="拼多多">拼多多</option>
              <option value="Facebook">Facebook</option>
              <option value="eBay">eBay</option>
              <option value="其他">其他</option>
            </select>
          </label>

          <label>
            业务类型
            <select id="businessType">
              <option value="xianyu">闲鱼卖货</option>
              <option value="virtual">虚拟服务</option>
              <option value="sam">山姆代下单</option>
              <option value="local">本地服务</option>
              <option value="trade">外贸询盘</option>
            </select>
          </label>
        </div>

        <div class="grid">
          <label>
            客户昵称
            <input id="customerName" placeholder="可不填" />
          </label>
          <label>
            客户文件夹
            <input id="customerFolder" placeholder="不填则用客户昵称" />
          </label>
        </div>

        <label>
          默认动作
          <select id="actionMode">
            <option value="analyze">直接生成回复</option>
            <option value="inbox">发送到消息中心</option>
          </select>
        </label>

        <div class="button-row">
          <button id="saveConfig" type="button">保存配置</button>
          <button id="testConnection" type="button">测试连接</button>
        </div>
      </details>

      <section class="panel">
        <div class="section-title">客户消息</div>
        <label>
          选中或输入的客户消息
          <textarea id="rawMessage" placeholder="先在聊天网页选中客户消息，也可以手动粘贴"></textarea>
        </label>
        <button id="capture" type="button">读取网页选中文本</button>
        <div class="button-row">
          <button id="send" type="button">发送到消息中心</button>
          <button id="analyze" type="button" class="primary">直接生成回复</button>
        </div>
      </section>

      <section id="resultPanel" class="panel result hidden">
        <div class="section-title">AI 回复草稿</div>
        <label>
          客户诉求
          <div id="summary" class="box muted"></div>
        </label>
        <label>
          缺失信息
          <ul id="missingInfo" class="box list"></ul>
        </label>
        <label>
          风险点
          <ul id="riskFlags" class="box list"></ul>
        </label>
        <label>
          推荐回复
          <textarea id="reply" readonly></textarea>
        </label>
        <div class="button-row">
          <button id="copyReply" type="button" class="primary">复制回复</button>
          <button id="saveOrder" type="button">保存订单</button>
        </div>
        <button id="openMessages" type="button">打开消息中心 / 保存订单</button>
      </section>

      <p id="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
